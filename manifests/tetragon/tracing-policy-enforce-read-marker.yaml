# Runtime enforcement: SIGKILL on read of /etc/os-release (Ollama pod — see lab guide).
# Apply only after you have read the file once without the policy; removes need for a synthetic file.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: ai-demo-enforce-read-marker
spec:
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/etc/os-release"
            - index: 1
              operator: "Equal"
              values:
                - "4"
          matchActions:
            - action: Sigkill
