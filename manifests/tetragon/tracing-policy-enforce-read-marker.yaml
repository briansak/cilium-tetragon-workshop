# Runtime enforcement: SIGKILL on read of a lab-only path (see lab guide).
# Targets /tmp/ollama-instructions.txt — create that file before applying this policy.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: ai-demo-enforce-read-marker
spec:
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/tmp/ollama-instructions.txt"
            - index: 1
              operator: "Equal"
              values:
                - "4"
          matchActions:
            - action: Sigkill
