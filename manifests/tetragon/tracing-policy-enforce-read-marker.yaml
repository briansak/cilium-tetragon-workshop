# Runtime enforcement: SIGKILL on read of os-release in the Ollama pod (see lab guide).
# /etc/os-release is often a symlink; match both the link and /usr/lib/os-release (kernel path).
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: ai-demo-enforce-read-marker
spec:
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/etc/os-release"
                - "/usr/lib/os-release"
            - index: 1
              operator: "Equal"
              values:
                - "4"
          matchActions:
            - action: Sigkill
